<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ProductOps</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #fff;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left {
      width: 42%;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 56px;
      position: relative;
      overflow: hidden;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 600;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 15px;
      color: #6b6b6b;
      line-height: 1.65;
      max-width: 340px;
    }

    /* geometric decoration */
    .deco {
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 260px;
      height: 260px;
      border: 1px solid #222;
      border-radius: 50%;
    }
    .deco::after {
      content: '';
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      bottom: 30px;
      border: 1px solid #1a1a1a;
      border-radius: 50%;
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 48px;
    }

    .form-wrap {
      width: 100%;
      max-width: 400px;
    }

    .form-wrap header {
      margin-bottom: 36px;
    }

    .form-wrap header h2 {
      font-size: 26px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.5px;
    }

    .form-wrap header p {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    .divider {
      height: 1px;
      background: #ebebeb;
      margin-bottom: 32px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #222;
    }

    .forgot {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }
    .forgot:hover { color: #111; }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input::placeholder { color: #bbb; }
    input:focus {
      border-color: #111;
      background: #fff;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #111;
      cursor: pointer;
    }

    .remember span {
      font-size: 13px;
      color: #777;
    }

    .btn-primary {
      width: 100%;
      height: 48px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #333; }

    .or-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }
    .or-row span {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
    }
    .or-row::before,
    .or-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ebebeb;
    }

    .btn-secondary {
      width: 100%;
      height: 46px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-secondary:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }

    .signup-row {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
    .signup-row a {
      color: #111;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <!-- Left panel -->
  <aside class="left">
    <div class="logo">ProductOps.</div>

    <div class="hero">
      <h1>Onde a estratégia<br>ganha vida.</h1>
      <p>Gerencie roadmaps, priorize entregas<br>e alinhe seu time com clareza total.</p>
    </div>

    <div class="deco"></div>
  </aside>

  <!-- Right panel -->
  <main class="right">
    <div class="form-wrap">
      <header>
        <h2>Bem-vindo de volta</h2>
        <p>Acesse seu workspace</p>
      </header>

      <div class="divider"></div>

      <form>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="voce@empresa.com" autocomplete="email" />
        </div>

        <div class="field">
          <div class="field-header">
            <label for="password">Senha</label>
            <a href="#" class="forgot">Esqueceu a senha?</a>
          </div>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div class="remember">
          <input type="checkbox" id="remember" />
          <span>Lembrar de mim por 30 dias</span>
        </div>

        <button type="submit" class="btn-primary">Entrar no Workspace</button>

        <div class="or-row"><span>ou</span></div>

        <button type="button" class="btn-secondary">Entrar com SSO</button>
      </form>

      <p class="signup-row">
        Não tem uma conta? <a href="#">Solicite acesso</a>
      </p>
    </div>
  </main>

</body>
</html>
